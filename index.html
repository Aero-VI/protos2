<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LumbridgeScape — OSRS Prototype</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'VT323', monospace; cursor: default; image-rendering: pixelated; }
canvas { display: block; }

#ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
#ui-layer > * { pointer-events: auto; }

/* Chat box - OSRS style */
#chatbox {
  position: fixed; bottom: 0; left: 0; width: 520px; height: 152px;
  background: linear-gradient(180deg, rgba(60,50,30,0.95) 0%, rgba(40,32,18,0.97) 100%);
  border: 2px solid #5a4a2a; border-bottom: none;
  display: flex; flex-direction: column; z-index: 20;
}
#chat-tabs { display: flex; background: #3c2f1a; border-bottom: 1px solid #5a4a2a; }
.chat-tab { padding: 3px 12px; color: #b0a060; font-size: 13px; cursor: pointer; border-right: 1px solid #5a4a2a; }
.chat-tab.active { color: #ffd700; background: #5a4a2a; }
#chat-log {
  flex: 1; overflow-y: auto; padding: 4px 8px; color: #000; font-size: 14px;
  line-height: 1.35; scrollbar-width: thin; background: rgba(210,190,150,0.12);
}
#chat-log .system { color: #3366ff; }
#chat-log .game { color: #990000; }
#chat-log .npc { color: #00aa00; }
#chat-log .drop { color: #7f00ff; font-weight: bold; }
#chat-log .rare { color: #ff0000; font-weight: bold; }
#chat-log .combat { color: #cc3300; }
#chat-log .skill { color: #006600; }
#chat-log .player { color: #0000ff; }
#chat-input-row { display: flex; border-top: 1px solid #5a4a2a; }
#chat-input {
  flex: 1; background: rgba(30,24,12,0.8); border: none; color: #00ffff;
  padding: 4px 10px; font-size: 14px; outline: none; font-family: 'VT323', monospace;
}

/* Minimap */
#minimap {
  position: fixed; top: 4px; right: 4px; width: 172px; height: 172px;
  border: 3px solid #ffd700; border-radius: 50%; overflow: hidden;
  background: #1a3a1a; z-index: 20;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 8px rgba(255,215,0,0.3);
}
#minimap canvas { border-radius: 50%; }
#minimap-frame {
  position: absolute; top: -3px; left: -3px; width: 178px; height: 178px;
  border: 3px solid #c8a832; border-radius: 50%; pointer-events: none;
}

/* Side panel */
#side-panel {
  position: fixed; top: 186px; right: 4px; width: 218px;
  background: linear-gradient(180deg, rgba(70,58,34,0.95) 0%, rgba(50,40,22,0.97) 100%);
  border: 2px solid #5a4a2a; border-radius: 4px;
  z-index: 20; max-height: calc(100vh - 200px); overflow-y: auto;
}

/* Tab buttons */
#tab-bar {
  display: flex; background: #3c2f1a; border-bottom: 2px solid #5a4a2a;
}
.tab-btn {
  flex: 1; padding: 6px 2px; text-align: center; background: #3a3020;
  border-right: 1px solid #5a4a2a; color: #b09850; font-size: 13px; cursor: pointer;
  user-select: none; font-family: 'VT323', monospace;
}
.tab-btn:last-child { border-right: none; }
.tab-btn.active { background: #5a4a2a; color: #ffd700; }
.tab-btn:hover { background: #4a3a20; }

/* Inventory */
#inv-panel { display: none; padding: 4px; }
#inv-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; padding: 2px;
}
.inv-slot {
  width: 48px; height: 48px; background: rgba(60,45,20,0.6); border: 1px solid #2a2210;
  border-radius: 2px; display: flex; align-items: center; justify-content: center;
  flex-direction: column; position: relative; cursor: pointer;
  image-rendering: pixelated;
}
.inv-slot:hover { background: rgba(90,74,42,0.7); border-color: #5a4a2a; }
.inv-slot canvas { image-rendering: pixelated; }
.inv-slot .item-name {
  position: absolute; bottom: 0; left: 0; right: 0;
  font-size: 9px; color: #ff8800; text-align: center;
  text-shadow: 1px 1px 0 #000; line-height: 1;
  font-family: 'VT323', monospace;
}
.inv-slot .item-count {
  position: absolute; top: 1px; left: 2px; font-size: 11px;
  color: #ffff00; text-shadow: 1px 1px 0 #000;
  font-family: 'VT323', monospace;
}
.inv-slot.equipped { border: 2px solid #ffd700; background: rgba(255,215,0,0.12); }

/* Stats panel */
#stats-panel { display: none; padding: 6px; }
.stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 2px 4px; margin: 1px 0; border-radius: 2px;
}
.stat-row:hover { background: rgba(255,215,0,0.08); }
.stat-icon { width: 18px; height: 18px; margin-right: 4px; image-rendering: pixelated; }
.stat-name { color: #ffd700; font-size: 14px; flex: 1; }
.stat-level { color: #ffffff; font-size: 14px; font-weight: bold; }
.stat-xp { color: #aaa080; font-size: 11px; }

/* Equipment panel */
#equip-panel { display: none; padding: 10px; text-align: center; }
.equip-grid {
  display: grid; grid-template-columns: repeat(3, 56px); gap: 4px;
  justify-content: center; margin-top: 6px;
}
.equip-slot-box {
  width: 56px; height: 56px; background: rgba(0,0,0,0.35);
  border: 2px solid #3a3020; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #6a5a3a; cursor: pointer;
}
.equip-slot-box.has-item { border-color: #7a6a3a; }
.equip-slot-box canvas { image-rendering: pixelated; }

/* Context menu */
#context-menu {
  position: fixed; display: none; z-index: 100;
  background: #3b3121; border: 2px solid #5a4a2a; min-width: 170px;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.7); font-family: 'VT323', monospace;
}
#context-menu .menu-title {
  padding: 4px 10px; color: #ffd700; font-size: 14px; font-weight: bold;
  background: linear-gradient(180deg, #4a3a1a, #3b3121);
  border-bottom: 1px solid #5a4a2a;
}
#quest-panel { display: none; padding: 8px; }
#quest-panel h3 { color: #ffd700; font-size: 16px; margin-bottom: 8px; font-family: 'VT323', monospace; }
#quest-panel .quest-item { padding: 3px 6px; font-size: 14px; font-family: 'VT323', monospace; cursor: pointer; }
#quest-panel .quest-item:hover { background: rgba(255,215,0,0.1); }
#quest-panel .quest-item.in-progress { color: #ffff00; }
#quest-panel .quest-item.not-started { color: #ff3333; }
#quest-panel .quest-item.completed { color: #00cc00; }
#context-menu .menu-item {
  padding: 3px 10px; color: #ffffff; font-size: 14px; cursor: pointer;
}
#context-menu .menu-item:hover { background: #5a4a2a; color: #fff; }
#context-menu .menu-item .action-name { color: #ffff00; }

/* NPC Dialog */
#npc-dialog {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 440px; background: rgba(50,40,20,0.97); border: 3px solid #5a4a2a;
  border-radius: 0; z-index: 50; display: none;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}
#npc-dialog-header {
  background: linear-gradient(180deg, #7a6a3a, #5a4a2a);
  padding: 8px 14px; color: #ffd700; font-weight: bold; font-size: 18px;
}
#npc-dialog-body { padding: 14px; color: #e0d0a0; font-size: 16px; line-height: 1.5; }
#npc-dialog-options { padding: 6px 14px 14px; }
#npc-dialog-options div {
  color: #00aaff; cursor: pointer; padding: 4px 0; font-size: 15px;
}
#npc-dialog-options div:hover { color: #ffff00; }

/* XP popup */
.xp-popup {
  position: fixed; color: #fff; font-size: 16px; font-weight: bold;
  text-shadow: 1px 1px 2px #000; pointer-events: none; z-index: 30;
  font-family: 'VT323', monospace;
  animation: xpFloat 2s ease-out forwards;
}
@keyframes xpFloat {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-50px); }
}

/* Health bar overlay */
.health-bar-container {
  position: absolute; pointer-events: none; z-index: 15;
}
.health-bar-bg {
  width: 32px; height: 5px; background: #300; border: 1px solid #000;
}
.health-bar-fill {
  height: 100%; background: #0f0; transition: width 0.2s;
}
.health-bar-fill.low { background: #ff0; }
.health-bar-fill.critical { background: #f00; }

/* Hit splat */
.hit-splat {
  position: fixed; z-index: 35; pointer-events: none;
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: bold; color: #fff;
  text-shadow: 1px 1px 0 #000;
  font-family: 'VT323', monospace;
  animation: hitSplatAnim 1s ease-out forwards;
}
.hit-splat.damage { background: radial-gradient(circle, #cc0000 60%, #880000 100%); }
.hit-splat.miss { background: radial-gradient(circle, #0066cc 60%, #003388 100%); }
@keyframes hitSplatAnim {
  0% { opacity: 1; transform: translateY(0) scale(1.2); }
  20% { transform: translateY(-5px) scale(1); }
  100% { opacity: 0; transform: translateY(-20px); }
}

/* Loot pile */
.loot-text {
  position: fixed; z-index: 14; pointer-events: none;
  color: #ff2222; font-size: 12px; font-family: 'VT323', monospace;
  text-shadow: 1px 1px 0 #000; white-space: nowrap;
}

/* Loading */
#loading {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #000; display: flex; align-items: center; justify-content: center;
  flex-direction: column; z-index: 1000; color: #ffd700; font-size: 22px;
  font-family: 'VT323', monospace;
}
#loading-bar-bg {
  width: 300px; height: 24px; background: #1a1206;
  border: 2px solid #5a4a2a; margin-top: 16px; border-radius: 0;
}
#loading-bar {
  width: 0%; height: 100%;
  background: linear-gradient(90deg, #8B4513, #CD853F, #DEB887);
  transition: width 0.3s;
}
#loading-text { margin-top: 8px; font-size: 14px; color: #aaa; }

/* Tooltip */
#tooltip {
  position: fixed; display: none; z-index: 200;
  background: #1a1206; border: 1px solid #5a4a2a;
  padding: 4px 8px; color: #ff8800; font-size: 13px;
  font-family: 'VT323', monospace; pointer-events: none;
  white-space: nowrap;
}

/* Cursor styles */
.cursor-attack { cursor: crosshair; }
</style>
</head>
<body>

<div id="loading">
  <div>⚔️ Loading LumbridgeScape...</div>
  <div id="loading-bar-bg"><div id="loading-bar"></div></div>
  <div id="loading-text">Preparing world...</div>
</div>

<div id="ui-layer">
  <div id="chatbox">
    <div id="chat-tabs">
      <div class="chat-tab active">All</div>
      <div class="chat-tab">Game</div>
      <div class="chat-tab">Public</div>
    </div>
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <input id="chat-input" placeholder="Press Enter to chat..." />
    </div>
  </div>

  <div id="minimap">
    <canvas id="minimap-canvas" width="172" height="172"></canvas>
    <div id="minimap-frame"></div>
  </div>

  <div id="side-panel">
    <div id="tab-bar">
      <div class="tab-btn active" data-tab="inv">⚔ Inv</div>
      <div class="tab-btn" data-tab="equip">👤 Worn</div>
      <div class="tab-btn" data-tab="stats">📊 Stats</div>
      <div class="tab-btn" data-tab="quest">📜 Quest</div>
    </div>
    <div id="inv-panel"></div>
    <div id="equip-panel"></div>
    <div id="stats-panel"></div>
    <div id="quest-panel">
      <h3>Quest Journal</h3>
      <div class="quest-item in-progress">⚠ Cook's Assistant</div>
      <div class="quest-item not-started">✗ Sheep Shearer</div>
      <div class="quest-item not-started">✗ Romeo & Juliet</div>
      <div class="quest-item not-started">✗ Doric's Quest</div>
      <div class="quest-item not-started">✗ Rune Mysteries</div>
      <div class="quest-item completed">✓ Tutorial Island</div>
    </div>
  </div>

  <div id="context-menu"></div>
  <div id="npc-dialog"></div>
  <div id="tooltip"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ============================================================
// PIXEL ART ITEM ICON RENDERER
// ============================================================
const ItemIcons = {
  cache: {},

  draw(name) {
    if (this.cache[name]) return this.cache[name];
    const c = document.createElement('canvas');
    c.width = 32; c.height = 32;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    const draw = this.icons[name];
    if (draw) draw(ctx);
    this.cache[name] = c;
    return c;
  },

  icons: {
    'Logs': (ctx) => {
      // OSRS-style log: brown cylinder with bark texture and visible rings
      const colors = { dark: '#5C3A1E', mid: '#7A5230', light: '#96653A', ring: '#4A2E16', highlight: '#B8845A' };
      // Main log body
      ctx.fillStyle = colors.mid;
      ctx.fillRect(4, 10, 24, 12);
      // Bark texture lines
      ctx.fillStyle = colors.dark;
      for (let y = 11; y < 22; y += 3) {
        ctx.fillRect(5, y, 22, 1);
      }
      // Top highlight
      ctx.fillStyle = colors.light;
      ctx.fillRect(5, 10, 22, 2);
      // End grain (circle at right end)
      ctx.fillStyle = colors.ring;
      ctx.fillRect(25, 11, 3, 10);
      ctx.fillStyle = colors.highlight;
      ctx.fillRect(26, 13, 1, 6);
      // Ring detail on end
      ctx.fillStyle = colors.dark;
      ctx.fillRect(26, 14, 1, 1);
      ctx.fillRect(26, 18, 1, 1);
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(4, 22, 24, 2);
    },

    'Oak logs': (ctx) => {
      ctx.fillStyle = '#6B4226';
      ctx.fillRect(3, 9, 26, 14);
      ctx.fillStyle = '#8B5E3C';
      ctx.fillRect(4, 9, 24, 3);
      ctx.fillStyle = '#503018';
      for (let y = 12; y < 23; y += 3) ctx.fillRect(4, y, 24, 1);
      ctx.fillStyle = '#3A2210';
      ctx.fillRect(26, 10, 3, 12);
      ctx.fillStyle = '#9B7050';
      ctx.fillRect(27, 12, 1, 8);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(3, 23, 26, 2);
    },

    'Bronze axe': (ctx) => {
      // Handle
      ctx.fillStyle = '#6B4226';
      ctx.fillRect(8, 8, 3, 20);
      ctx.fillStyle = '#8B5E3C';
      ctx.fillRect(9, 8, 1, 20);
      // Axe head
      ctx.fillStyle = '#CD7F32';
      ctx.fillRect(11, 6, 10, 4);
      ctx.fillRect(13, 4, 8, 2);
      ctx.fillRect(15, 2, 6, 2);
      ctx.fillRect(11, 10, 8, 3);
      // Highlight
      ctx.fillStyle = '#E8A84C';
      ctx.fillRect(14, 4, 6, 1);
      ctx.fillRect(12, 6, 8, 1);
      // Edge
      ctx.fillStyle = '#A06020';
      ctx.fillRect(20, 3, 1, 6);
      ctx.fillRect(18, 10, 1, 3);
    },

    'Bones': (ctx) => {
      ctx.fillStyle = '#E8DCC8';
      // Bone shaft
      ctx.fillRect(12, 6, 8, 20);
      // Top knobs
      ctx.fillRect(8, 4, 7, 6);
      ctx.fillRect(17, 4, 7, 6);
      // Bottom knobs
      ctx.fillRect(8, 22, 7, 6);
      ctx.fillRect(17, 22, 7, 6);
      // Shadow/depth
      ctx.fillStyle = '#C8B8A0';
      ctx.fillRect(12, 8, 2, 16);
      ctx.fillRect(8, 6, 2, 3);
      ctx.fillRect(8, 24, 2, 3);
      // Highlight
      ctx.fillStyle = '#FFF8F0';
      ctx.fillRect(16, 7, 2, 14);
      ctx.fillRect(20, 5, 2, 3);
      ctx.fillRect(20, 23, 2, 3);
    },

    'Feather': (ctx) => {
      // Quill
      ctx.fillStyle = '#F5F0E0';
      ctx.fillRect(14, 4, 2, 24);
      ctx.fillStyle = '#E0D8C0';
      ctx.fillRect(15, 4, 1, 24);
      // Barbs left
      ctx.fillStyle = '#D0D0D0';
      for (let y = 5; y < 22; y += 2) {
        ctx.fillRect(14 - (y - 5) / 3, y, (y - 5) / 3 + 1, 2);
      }
      // Barbs right
      for (let y = 5; y < 22; y += 2) {
        ctx.fillRect(16, y, (y - 5) / 3 + 1, 2);
      }
      // Tip
      ctx.fillStyle = '#C0B8A0';
      ctx.fillRect(14, 26, 2, 2);
    },

    'Coins': (ctx) => {
      // Stack of gold coins
      ctx.fillStyle = '#DAA520';
      ctx.beginPath();
      ctx.arc(16, 18, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(16, 17, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFC000';
      ctx.beginPath();
      ctx.arc(16, 16, 6, 0, Math.PI * 2);
      ctx.fill();
      // GP symbol
      ctx.fillStyle = '#B8860B';
      ctx.fillRect(14, 13, 4, 7);
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(15, 14, 2, 5);
    },

    'Raw shrimps': (ctx) => {
      ctx.fillStyle = '#D4A08A';
      // Body curve
      ctx.fillRect(10, 8, 12, 5);
      ctx.fillRect(8, 12, 10, 4);
      ctx.fillRect(6, 15, 8, 3);
      // Tail
      ctx.fillStyle = '#C09080';
      ctx.fillRect(4, 17, 6, 4);
      ctx.fillRect(2, 20, 5, 3);
      // Head
      ctx.fillStyle = '#E0B0A0';
      ctx.fillRect(18, 7, 6, 5);
      // Eye
      ctx.fillStyle = '#000';
      ctx.fillRect(22, 8, 2, 2);
      // Legs
      ctx.fillStyle = '#C09080';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(12 + i * 3, 13, 1, 5);
      }
    },

    'Cooked shrimps': (ctx) => {
      ctx.fillStyle = '#CC6633';
      ctx.fillRect(10, 8, 12, 5);
      ctx.fillRect(8, 12, 10, 4);
      ctx.fillRect(6, 15, 8, 3);
      ctx.fillStyle = '#AA5522';
      ctx.fillRect(4, 17, 6, 4);
      ctx.fillRect(2, 20, 5, 3);
      ctx.fillStyle = '#DD7744';
      ctx.fillRect(18, 7, 6, 5);
      ctx.fillStyle = '#000';
      ctx.fillRect(22, 8, 2, 2);
    },

    'Copper ore': (ctx) => {
      // Rock shape
      ctx.fillStyle = '#8B6D3E';
      ctx.fillRect(6, 10, 20, 16);
      ctx.fillRect(8, 8, 16, 2);
      ctx.fillRect(10, 6, 12, 2);
      // Copper veins
      ctx.fillStyle = '#CD7F32';
      ctx.fillRect(10, 12, 5, 4);
      ctx.fillRect(18, 14, 4, 5);
      ctx.fillRect(12, 20, 6, 3);
      // Highlights
      ctx.fillStyle = '#E8A84C';
      ctx.fillRect(11, 13, 2, 2);
      ctx.fillRect(19, 15, 2, 2);
      // Shadow
      ctx.fillStyle = '#6B4D2E';
      ctx.fillRect(6, 24, 20, 2);
    },

    'Tin ore': (ctx) => {
      ctx.fillStyle = '#808080';
      ctx.fillRect(6, 10, 20, 16);
      ctx.fillRect(8, 8, 16, 2);
      ctx.fillRect(10, 6, 12, 2);
      // Tin veins
      ctx.fillStyle = '#A8A8A8';
      ctx.fillRect(10, 12, 5, 4);
      ctx.fillRect(18, 14, 4, 5);
      ctx.fillRect(12, 20, 6, 3);
      ctx.fillStyle = '#C0C0C0';
      ctx.fillRect(11, 13, 2, 2);
      ctx.fillRect(19, 15, 2, 2);
      ctx.fillStyle = '#606060';
      ctx.fillRect(6, 24, 20, 2);
    },

    'Bronze bar': (ctx) => {
      ctx.fillStyle = '#CD7F32';
      ctx.fillRect(6, 12, 20, 10);
      ctx.fillStyle = '#E8A84C';
      ctx.fillRect(7, 12, 18, 3);
      ctx.fillStyle = '#A06020';
      ctx.fillRect(6, 20, 20, 2);
      ctx.fillRect(6, 12, 2, 10);
      ctx.fillStyle = '#FFD080';
      ctx.fillRect(8, 13, 6, 1);
    },

    "Bird's nest": (ctx) => {
      // Nest base (twigs)
      ctx.fillStyle = '#6B4226';
      ctx.fillRect(4, 18, 24, 8);
      ctx.fillRect(6, 16, 20, 2);
      ctx.fillStyle = '#8B5E3C';
      ctx.fillRect(6, 18, 2, 6);
      ctx.fillRect(14, 18, 2, 6);
      ctx.fillRect(22, 18, 2, 6);
      // Inner bowl
      ctx.fillStyle = '#5C3A1E';
      ctx.fillRect(8, 16, 16, 4);
      // Eggs
      ctx.fillStyle = '#E8E0D0';
      ctx.fillRect(10, 14, 4, 5);
      ctx.fillRect(16, 14, 4, 5);
      ctx.fillStyle = '#D0C8B8';
      ctx.fillRect(13, 15, 4, 4);
      // Spots on eggs
      ctx.fillStyle = '#B0A090';
      ctx.fillRect(11, 15, 1, 1);
      ctx.fillRect(17, 16, 1, 1);
    },

    'Raw chicken': (ctx) => {
      ctx.fillStyle = '#FFD0B0';
      ctx.fillRect(8, 8, 16, 14);
      ctx.fillRect(10, 6, 12, 2);
      ctx.fillRect(12, 22, 8, 4);
      ctx.fillStyle = '#EEC0A0';
      ctx.fillRect(8, 10, 4, 8);
      ctx.fillRect(20, 10, 4, 8);
      ctx.fillStyle = '#FFE0C0';
      ctx.fillRect(12, 9, 8, 4);
    },

    'Cooked chicken': (ctx) => {
      ctx.fillStyle = '#C08040';
      ctx.fillRect(8, 8, 16, 14);

function addItem(name, count = 1) {
  const existing = State.inventory.find(i => i.name === name);
  if (existing) existing.count += count;
  else if (State.inventory.length < 28) State.inventory.push({ name, count });
  else { chatMsg("Your inventory is full!", 'game'); return false; }
  refreshInventory();
  return true;
}

function removeItem(name, count = 1) {
  const idx = State.inventory.findIndex(i => i.name === name);
  if (idx === -1) return false;
  State.inventory[idx].count -= count;
  if (State.inventory[idx].count <= 0) State.inventory.splice(idx, 1);
  refreshInventory();
  return true;
}

function hasItem(name) {
  return State.inventory.some(i => i.name === name);
}

function xpForLevel(l) { let t = 0; for (let i = 1; i < l; i++) t += Math.floor(i + 300 * Math.pow(2, i / 7)); return Math.floor(t / 4); }

function addXP(skill, amount) {
  const prev = State.skills[skill].level;
  State.skills[skill].xp += amount;
  while (State.skills[skill].xp >= xpForLevel(State.skills[skill].level + 1)) {
    State.skills[skill].level++;
  }
  if (State.skills[skill].level > prev) {
    chatMsg(`Congratulations! You've advanced a ${skill.charAt(0).toUpperCase() + skill.slice(1)} level! You are now level ${State.skills[skill].level}.`, 'skill');
    if (skill === 'hitpoints') {
      State.maxHP = State.skills.hitpoints.level;
      State.currentHP = State.maxHP;
    }
  }
  showXPDrop(amount, skill);
  refreshStats();
}

function showHitSplat(target3d, damage) {
  const el = document.createElement('div');
  el.className = 'hit-splat ' + (damage > 0 ? 'damage' : 'miss');
  el.textContent = damage;
  const pos = toScreenPos(target3d.position);
  el.style.left = (pos.x - 14) + 'px';
  el.style.top = (pos.y - 30) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function toScreenPos(worldPos) {
  const v = worldPos.clone();
  v.y += 3;
  v.project(camera);
  return {
    x: (v.x * 0.5 + 0.5) * window.innerWidth,
    y: (-v.y * 0.5 + 0.5) * window.innerHeight
  };
}

function refreshInventory() {
  let html = '<div id="inv-grid">';
  // Equipped weapon first
  if (State.equipment.weapon) {
    const ic = ItemIcons.draw(State.equipment.weapon.icon);
    html += `<div class="inv-slot equipped"><canvas class="item-canvas" data-item="${State.equipment.weapon.name}" width="32" height="32"></canvas><span class="item-count">E</span></div>`;
  }
  for (const item of State.inventory) {
    html += `<div class="inv-slot"><canvas class="item-canvas" data-item="${item.name}" width="32" height="32"></canvas>`;
    if (item.count > 1) html += `<span class="item-count">${item.count >= 100000 ? Math.floor(item.count/1000)+'K' : item.count}</span>`;
    html += `<span class="item-name">${item.name}</span></div>`;
  }
  const total = (State.equipment.weapon ? 1 : 0) + State.inventory.length;
  for (let i = total; i < 28; i++) html += '<div class="inv-slot"></div>';
  html += '</div>';
  invPanel.innerHTML = html;

  // Render icons to canvases, then try wiki sprites as upgrade
  invPanel.querySelectorAll('.item-canvas').forEach(c => {
    const name = c.dataset.item;
    const src = ItemIcons.draw(name);
    if (src) {
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(src, 0, 0);
    }
    // Try loading OSRS wiki sprite as overlay
    const wikiName = name.replace(/ /g, '_');
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, 32, 32);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, 0, 0, 32, 32);
    };

  // Right-click on inventory items
  invPanel.querySelectorAll('.inv-slot').forEach(slot => {
    slot.addEventListener('contextmenu', e => {
      e.preventDefault();

      const canvas = slot.querySelector('.item-canvas');

}

function refreshStats() {
  let html = `<div style="color:#ffd700;font-size:14px;padding:4px;border-bottom:1px solid #5a4a2a;margin-bottom:4px">Skills</div>`;
  for (const [name, s] of Object.entries(State.skills)) {

      <span class="stat-name">${s.icon} ${name.charAt(0).toUpperCase() + name.slice(1)}</span>

      <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#1a8a1a,#2abb2a);border-radius:1px"></div>

function generateGrassTexture() {
  const size = 128;
  const data = new Uint8Array(size * size * 4);
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const i = (y * size + x) * 4;
      const r = Math.random();
      const noise = Math.sin(x * 0.3) * Math.cos(y * 0.3) * 0.1;
      // OSRS grass colors: dark green base with yellow-green variation
      data[i] = 45 + r * 25 + noise * 20;      // R
      data[i+1] = 95 + r * 45 + noise * 30;     // G
      data[i+2] = 25 + r * 15;                   // B
      data[i+3] = 255;
    }
  }
  return data;
}

const grassTexData = generateGrassTexture();
const grassTex = new THREE.DataTexture(grassTexData, 128, 128, THREE.RGBAFormat);
grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
grassTex.repeat.set(50, 50);
grassTex.magFilter = THREE.NearestFilter;
grassTex.needsUpdate = true;

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(250, 250, 20, 20),
  new THREE.MeshLambertMaterial({ map: grassTex })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
ground.userData = { type: 'ground' };
scene.add(ground);

// Dirt paths - OSRS brown
function createPath(x, z, w, d) {
  const pathTex = createDirtTexture();
  const p = new THREE.Mesh(
    new THREE.PlaneGeometry(w, d),
    new THREE.MeshLambertMaterial({ map: pathTex })
  );
  p.rotation.x = -Math.PI / 2;
  p.position.set(x, 0.03, z);
  p.receiveShadow = true;
  scene.add(p);
  return p;
}

function createDirtTexture() {
  const size = 32;
  const data = new Uint8Array(size * size * 4);
  for (let i = 0; i < size * size; i++) {
    const r = Math.random();
    data[i*4] = 130 + r * 30;
    data[i*4+1] = 100 + r * 25;
    data[i*4+2] = 60 + r * 20;
    data[i*4+3] = 255;
  }
  const tex = new THREE.DataTexture(data, size, size, THREE.RGBAFormat);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4, 4);
  tex.magFilter = THREE.NearestFilter;
  tex.needsUpdate = true;
  return tex;
}

function createWaterTexture() {
  const size = 64;
  const data = new Uint8Array(size * size * 4);
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const i = (y * size + x) * 4;
      const wave = Math.sin(x * 0.4 + y * 0.3) * 0.1;
      data[i] = 30 + wave * 20;
      data[i+1] = 80 + wave * 30;
      data[i+2] = 160 + wave * 20;
      data[i+3] = 180;
    }
  }
  const tex = new THREE.DataTexture(data, size, size, THREE.RGBAFormat);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4, 8);
  tex.magFilter = THREE.NearestFilter;
  tex.needsUpdate = true;
  return tex;
}

function createTree(x, z, isOak = false) {
  const group = new THREE.Group();
  const scale = isOak ? 1.3 + Math.random() * 0.3 : 0.9 + Math.random() * 0.4;
  const h = (isOak ? 5 : 3.5) * scale;

  // Trunk — OSRS style: slightly tapered cylinder
  const trunkGeo = new THREE.CylinderGeometry(0.25 * scale, 0.4 * scale, h, 6);
  const trunkMat = new THREE.MeshLambertMaterial({
    color: isOak ? 0x5C3A1E : 0x6B4226
  });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = h / 2;
  trunk.castShadow = true;
  group.add(trunk);

  // Bark detail rings
  for (let i = 0; i < 3; i++) {
    const ring = new THREE.Mesh(
      new THREE.CylinderGeometry(0.42 * scale, 0.42 * scale, 0.1, 6),
      new THREE.MeshLambertMaterial({ color: isOak ? 0x4A2E16 : 0x5C3A1E })
    );
    ring.position.y = h * 0.3 + i * h * 0.2;
    group.add(ring);
  }

  if (isOak) {
    // Oak: wider, rounder canopy with multiple clusters
    const leafColors = [0x2D6B1A, 0x357A20, 0x2A5E16];
    const positions = [
      [0, h + 1.5, 0, 2.8],
      [-1.2, h + 0.5, 0.8, 2.0],
      [1.0, h + 0.8, -0.6, 2.2],
      [0.5, h + 2.2, 0.5, 1.8],
      [-0.6, h + 2.0, -0.8, 1.6],
    ];
    positions.forEach(([lx, ly, lz, lr], i) => {
      const leaf = new THREE.Mesh(
        new THREE.DodecahedronGeometry(lr * scale, 1),
        new THREE.MeshLambertMaterial({ color: leafColors[i % 3] })
      );
      leaf.position.set(lx * scale, ly, lz * scale);
      leaf.castShadow = true;
      group.add(leaf);
    });
  } else {
    // Normal tree: triangular/conical shape like OSRS
    const leafColors = [0x1A6B0A, 0x228B12, 0x1E7A0E];
    // Bottom wide layer
    const leaf1 = new THREE.Mesh(
      new THREE.ConeGeometry(2.2 * scale, 2.0 * scale, 7),
      new THREE.MeshLambertMaterial({ color: leafColors[0] })
    );
    leaf1.position.y = h + 0.5;
    leaf1.castShadow = true;
    group.add(leaf1);

    // Middle layer
    const leaf2 = new THREE.Mesh(
      new THREE.ConeGeometry(1.7 * scale, 1.8 * scale, 7),
      new THREE.MeshLambertMaterial({ color: leafColors[1] })
    );
    leaf2.position.y = h + 1.8;
    leaf2.castShadow = true;
    group.add(leaf2);

    // Top
    const leaf3 = new THREE.Mesh(
      new THREE.ConeGeometry(1.0 * scale, 1.4 * scale, 6),
      new THREE.MeshLambertMaterial({ color: leafColors[2] })
    );
    leaf3.position.y = h + 3.0;
    leaf3.castShadow = true;
    group.add(leaf3);
  }

  group.position.set(x, 0, z);
  group.userData = {
    type: 'tree',
    name: isOak ? 'Oak Tree' : 'Tree',
    isOak,
    health: 100,
    active: true,
  };
  scene.add(group);
  trees.push(group);
  return group;
}

const miningRocks = [];

function createMiningRock(x, z, oreType) {
  const group = new THREE.Group();
  const colors = {
    copper: { base: 0x6B5A3E, vein: 0xCD7F32, highlight: 0xE8A84C },
    tin: { base: 0x707070, vein: 0xA8A8A8, highlight: 0xC8C8C8 },
  };
  const c = colors[oreType];

  // Rock base
  const baseGeo = new THREE.DodecahedronGeometry(1.2, 0);
  const baseMat = new THREE.MeshLambertMaterial({ color: c.base });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = 0.8;
  base.scale.set(1, 0.7, 1);
  base.castShadow = true;
  group.add(base);

  // Ore veins (smaller colored chunks)
  for (let i = 0; i < 4; i++) {
    const vein = new THREE.Mesh(
      new THREE.DodecahedronGeometry(0.25 + Math.random() * 0.2, 0),
      new THREE.MeshLambertMaterial({ color: c.vein })
    );
    const angle = (i / 4) * Math.PI * 2 + Math.random() * 0.5;
    vein.position.set(
      Math.cos(angle) * 0.6,
      0.5 + Math.random() * 0.6,
      Math.sin(angle) * 0.6
    );
    vein.castShadow = true;
    group.add(vein);
  }

  // Sparkling highlight
  const highlight = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.15, 0),
    new THREE.MeshBasicMaterial({ color: c.highlight })
  );
  highlight.position.set(0.3, 1.2, 0.3);
  group.add(highlight);
  group.userData._sparkle = highlight;

  group.position.set(x, 0, z);
  group.userData.type = 'rock';
  group.userData.oreType = oreType;
  group.userData.name = oreType === 'copper' ? 'Copper rock' : 'Tin rock';
  group.userData.active = true;
  group.userData.health = 100;
  scene.add(group);
  miningRocks.push(group);
  return group;
}

function createBuilding(x, z, w, d, h, options = {}) {
  const group = new THREE.Group();
  const wallColor = options.wallColor || 0xC8B898;
  const roofColor = options.roofColor || 0x8B4513;
  const hasChimney = options.chimney || false;

  // Stone/plaster walls
  const wallMat = new THREE.MeshLambertMaterial({ color: wallColor });

  // Main walls
  const walls = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
  walls.position.y = h / 2;
  walls.castShadow = true;
  walls.receiveShadow = true;
  group.add(walls);

  // Window frames
  if (w > 4) {
    const winMat = new THREE.MeshLambertMaterial({ color: 0x4488aa });
    const winFrameMat = new THREE.MeshLambertMaterial({ color: 0x5C3A1E });
    for (let side = -1; side <= 1; side += 2) {
      for (let i = -1; i <= 1; i += 2) {
        const win = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1), winMat);
        win.position.set(i * w * 0.25, h * 0.6, side * d / 2 + side * 0.02);
        group.add(win);
        const frame = new THREE.Mesh(new THREE.PlaneGeometry(1, 1.2), winFrameMat);
        frame.position.set(i * w * 0.25, h * 0.6, side * d / 2 + side * 0.01);
        group.add(frame);
      }
    }
  }

  // Roof
  const roofH = h * 0.45;
  const roofGeo = new THREE.ConeGeometry(Math.max(w, d) * 0.72, roofH, 4);
  const roofMat = new THREE.MeshLambertMaterial({ color: roofColor });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.y = h + roofH / 2;
  roof.rotation.y = Math.PI / 4;
  roof.castShadow = true;
  group.add(roof);

  // Door
  const door = new THREE.Mesh(
    new THREE.PlaneGeometry(1.4, 2.4),
    new THREE.MeshLambertMaterial({ color: 0x3A2010, side: THREE.DoubleSide })
  );
  door.position.set(0, 1.2, d / 2 + 0.02);
  group.add(door);

  // Door handle
  const handle = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 6, 6),
    new THREE.MeshLambertMaterial({ color: 0xCCBB33 })
  );
  handle.position.set(0.4, 1.2, d / 2 + 0.05);
  group.add(handle);

  // Chimney
  if (hasChimney) {
    const chimney = new THREE.Mesh(
      new THREE.BoxGeometry(1, 3, 1),
      new THREE.MeshLambertMaterial({ color: 0x666666 })
    );
    chimney.position.set(w * 0.3, h + roofH * 0.3, 0);
    chimney.castShadow = true;
    group.add(chimney);
  }

  group.position.set(x, 0, z);
  group.userData = { type: 'building', name: options.name || 'Building' };
  scene.add(group);
  return group;
}

const npcs = [];

function createNPC(x, z, name, shirtCol, pantsCol, options = {}) {
  const npc = new THREE.Group();

  // Body
  const nBody = new THREE.Mesh(
    new THREE.BoxGeometry(0.85, 1.2, 0.55),
    new THREE.MeshLambertMaterial({ color: shirtCol })
  );
  nBody.position.y = 2.05;
  nBody.castShadow = true;
  npc.add(nBody);

  // Head
  const nHead = new THREE.Mesh(
    new THREE.BoxGeometry(0.6, 0.65, 0.6),
    new THREE.MeshLambertMaterial({ color: options.skinColor || 0xE8C8A0 })
  );
  nHead.position.y = 3.0;
  nHead.castShadow = true;
  npc.add(nHead);

  // Hair
  if (options.hairColor) {
    const nHair = new THREE.Mesh(
      new THREE.BoxGeometry(0.65, 0.25, 0.65),
      new THREE.MeshLambertMaterial({ color: options.hairColor })
    );
    nHair.position.y = 3.4;
    npc.add(nHair);
  }

  // Hat
  if (options.hatColor) {
    const hat = new THREE.Mesh(
      new THREE.CylinderGeometry(0.45, 0.5, 0.5, 6),
      new THREE.MeshLambertMaterial({ color: options.hatColor })
    );
    hat.position.y = 3.55;
    npc.add(hat);
  }

  // Arms
  for (const s of [-0.55, 0.55]) {
    const arm = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, 1, 0.25),
      new THREE.MeshLambertMaterial({ color: shirtCol })
    );
    arm.position.set(s, 2, 0);
    arm.castShadow = true;
    npc.add(arm);
  }

  // Legs
  for (const s of [-0.18, 0.18]) {
    const leg = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 0.9, 0.3),
      new THREE.MeshLambertMaterial({ color: pantsCol })
    );
    leg.position.set(s, 1.0, 0);
    leg.castShadow = true;
    npc.add(leg);
  }

  // Name tag - OSRS yellow
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 48;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 24px VT323, monospace';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.strokeText(name, 128, 32);
  ctx.fillText(name, 128, 32);
  const tex = new THREE.CanvasTexture(canvas);
  const tag = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
  tag.position.y = 4.2;
  tag.scale.set(3, 0.6, 1);
  npc.add(tag);

  npc.position.set(x, 0, z);
  npc.userData = {
    type: 'npc', name,
    wanderCenter: new THREE.Vector2(x, z),
    wanderTimer: Math.random() * 5,
    wanderTarget: null
  };
  scene.add(npc);
  npcs.push(npc);
  return npc;
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let moveTarget = null;
let playerSpeed = 7;
let pendingInteraction = null;

const clickMarker = new THREE.Mesh(
  new THREE.RingGeometry(0.15, 0.4, 16),
  new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide })
);
clickMarker.rotation.x = -Math.PI / 2;
clickMarker.position.y = 0.06;
clickMarker.visible = false;
scene.add(clickMarker);

function getAllMeshes(obj, arr = []) {
  if (obj.isMesh) arr.push(obj);
  for (const c of obj.children) getAllMeshes(c, arr);
  return arr;
}

function getClickableObjects() {
  const meshes = [ground];
  for (const t of trees) if (t.visible) getAllMeshes(t, meshes);
  for (const n of npcs) getAllMeshes(n, meshes);
  for (const m of monsters) if (m.visible && m.userData.active) getAllMeshes(m, meshes);
  for (const r of miningRocks) if (r.visible && r.userData.active) getAllMeshes(r, meshes);
  for (const f of fishingSpots) getAllMeshes(f, meshes);
  return meshes;
}

function findParentGroup(obj) {
  let current = obj;
  while (current.parent) {
    if (current.userData && current.userData.type) return current;
    current = current.parent;
  }
  return null;
}

renderer.domElement.addEventListener('click', e => {
  if (e.button !== 0) return;
  if (contextMenu.style.display === 'block') return;
  if (npcDialog.style.display === 'block') return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObjects(getClickableObjects(), true);
  if (hits.length === 0) return;

  const hit = hits[0];
  const group = findParentGroup(hit.object);

  // Stop current actions
  cancelActions();

  if (group && group.userData.type === 'monster' && group.userData.active) {
    moveTarget = new THREE.Vector3(group.position.x, 0, group.position.z);
    pendingInteraction = { type: 'attack', target: group };
  } else if (group && group.userData.type === 'npc') {
    moveTarget = new THREE.Vector3(group.position.x, 0, group.position.z);
    pendingInteraction = { type: 'talk', name: group.userData.name };
  } else if (group && group.userData.type === 'tree' && group.userData.active) {
    moveTarget = new THREE.Vector3(group.position.x, 0, group.position.z);
    pendingInteraction = { type: 'chop', tree: group };
  } else if (group && group.userData.type === 'rock' && group.userData.active) {
    moveTarget = new THREE.Vector3(group.position.x, 0, group.position.z);
    pendingInteraction = { type: 'mine', rock: group };
  } else if (group && group.userData.type === 'fishingspot') {
    moveTarget = new THREE.Vector3(group.position.x + 3, 0, group.position.z);
    pendingInteraction = { type: 'fish', spot: group };
  } else {
    moveTarget = new THREE.Vector3(hit.point.x, 0, hit.point.z);
    pendingInteraction = null;
  }

  // Loot pile pickup
  for (let i = lootPiles.length - 1; i >= 0; i--) {
    const pile = lootPiles[i];
    if (player.position.distanceTo(pile.position) < 3 && hit.point.distanceTo(pile.position) < 2) {
      for (const item of pile.items) {
        addItem(item.name, item.count || 1);
        chatMsg(`You pick up: ${item.count > 1 ? item.count + ' x ' : ''}${item.name}`, 'drop');
      }
      if (pile.mesh) scene.remove(pile.mesh);
      lootPiles.splice(i, 1);
      return;
    }
  }

  clickMarker.position.set(moveTarget.x, 0.06, moveTarget.z);
  clickMarker.visible = true;
});

function cancelActions() {
  State.isChopping = false;
  State.chopTarget = null;
  State.chopTimer = 0;
  State.isMining = false;
  State.mineTarget = null;
  State.mineTimer = 0;
  State.isFishing = false;
  State.fishTimer = 0;
  if (State.inCombat && State.combatTarget) {
    State.combatTarget.userData.inCombat = false;
  }
  State.inCombat = false;
  State.combatTarget = null;
  State.combatTimer = 0;
  rightArmPivot.rotation.x = 0;
}

// ============================================================
// TREE CHOPPING
// ============================================================
function startChopping(tree) {
  if (!tree.visible || !tree.userData.active) {
    chatMsg("This tree has already been chopped down.", 'game');
    return;
  }
  if (!State.equipment.weapon || State.equipment.weapon.type !== 'axe') {
    chatMsg("You need an axe to chop this tree.", 'game');
    return;
  }
  State.chopTarget = tree;
  State.isChopping = true;
  State.chopTimer = 0;
  chatMsg("You swing your axe at the tree.", 'system');
  // Face the tree
  const dx = tree.position.x - player.position.x;
  const dz = tree.position.z - player.position.z;
  player.rotation.y = Math.atan2(dx, dz);
}

function doChopTick(dt) {
  if (!State.isChopping || !State.chopTarget) return;
  State.chopTimer += dt;

  // Animate arm swing
  rightArmPivot.rotation.x = Math.sin(State.chopTimer * 6) * 0.8;

  const chopTime = State.chopTarget.userData.isOak ? 4.0 : 2.5;
  if (State.chopTimer >= chopTime) {
    const tree = State.chopTarget;
    const logType = tree.userData.isOak ? 'Oak logs' : 'Logs';
    chatMsg(`You get some ${logType.toLowerCase()}.`, 'skill');
    addXP('woodcutting', tree.userData.isOak ? 37 : 25);
    addItem(logType);
    State.totalLogsChopped++;

    // Bird's nest chance (~5%)
    if (Math.random() < 0.05) {
      addItem("Bird's nest");
      chatMsg("A bird's nest falls out of the tree!", 'rare');
      chatMsg("🪺 You find a bird's nest!", 'drop');
    }

    // Falling animation
    const fallDir = Math.random() * Math.PI * 2;
    tree.userData.falling = true;
    tree.userData.fallAngle = 0;
    tree.userData.fallAxis = new THREE.Vector3(Math.cos(fallDir), 0, Math.sin(fallDir)).normalize();

    tree.userData.active = false;
    State.isChopping = false;
    State.chopTarget = null;
    State.chopTimer = 0;
    rightArmPivot.rotation.x = 0;

    // Respawn after 12s
    setTimeout(() => {
      tree.userData.falling = false;
      tree.rotation.set(0, 0, 0);
      tree.position.y = 0;
      tree.visible = true;
      tree.userData.active = true;
    }, 12000);
  }
}

// ============================================================
// MINING
// ============================================================
function startMining(rock) {
  if (!rock.userData.active) {
    chatMsg("There's no ore left in this rock.", 'game');
    return;
  }
  State.mineTarget = rock;
  State.isMining = true;
  State.mineTimer = 0;
  chatMsg("You swing your pickaxe at the rock.", 'system');
  const dx = rock.position.x - player.position.x;
  const dz = rock.position.z - player.position.z;
  player.rotation.y = Math.atan2(dx, dz);
}

function doMineTick(dt) {
  if (!State.isMining || !State.mineTarget) return;
  State.mineTimer += dt;

  rightArmPivot.rotation.x = Math.sin(State.mineTimer * 5) * 0.7;

  if (State.mineTimer >= 3.0) {
    const rock = State.mineTarget;
    const ore = rock.userData.oreType === 'copper' ? 'Copper ore' : 'Tin ore';
    chatMsg(`You manage to mine some ${ore.toLowerCase()}.`, 'skill');
    addXP('mining', rock.userData.oreType === 'copper' ? 17 : 17);
    addItem(ore);

    // Deplete rock
    rock.userData.active = false;
    rock.children.forEach(c => {
      if (c.material && c.material.color) {
        c.material = c.material.clone();
        c.material.color.setHex(0x555555);
      }
    });

    State.isMining = false;
    State.mineTarget = null;
    State.mineTimer = 0;
    rightArmPivot.rotation.x = 0;

    // Respawn after 8s
    setTimeout(() => {
      rock.userData.active = true;
      const colors = {
        copper: { base: 0x6B5A3E, vein: 0xCD7F32 },
        tin: { base: 0x707070, vein: 0xA8A8A8 },
      };
      const c = colors[rock.userData.oreType];
      rock.children.forEach((child, i) => {
        if (child.material && child.material.color) {
          child.material = child.material.clone();
          child.material.color.setHex(i === 0 ? c.base : c.vein);
        }
      });
    }, 8000);
  }
}

function startFishing(spot) {
  State.isFishing = true;

  chatMsg("You cast out your net...", 'system');
  const dx = spot.position.x - player.position.x;
  const dz = spot.position.z - player.position.z;

function doFishTick(dt) {

  rightArmPivot.rotation.x = Math.sin(State.fishTimer * 2) * 0.2;

  if (State.fishTimer >= 3.5) {

// ============================================================
// COMBAT
// ============================================================
function startCombat(monster) {
  if (!monster.userData.active) return;
  State.combatTarget = monster;
  State.inCombat = true;
  State.combatTimer = 0;
  monster.userData.inCombat = true;
  chatMsg(`You attack the ${monster.userData.name}.`, 'combat');
  const dx = monster.position.x - player.position.x;
  const dz = monster.position.z - player.position.z;
  player.rotation.y = Math.atan2(dx, dz);
}

function doCombatTick(dt) {
  if (!State.inCombat || !State.combatTarget) return;
  const mon = State.combatTarget;

  if (!mon.userData.active || !mon.visible) {
    cancelActions();
    return;
  }

  // Face monster
  const dx = mon.position.x - player.position.x;
  const dz = mon.position.z - player.position.z;
  const dist = Math.sqrt(dx * dx + dz * dz);
  player.rotation.y = Math.atan2(dx, dz);

  // Move into melee range
  if (dist > 2.5) {
    const step = Math.min(playerSpeed * dt, dist - 2);
    player.position.x += (dx / dist) * step;
    player.position.z += (dz / dist) * step;
    return;
  }

  State.combatTimer += dt;

  // Attack animation
  rightArmPivot.rotation.x = Math.sin(State.combatTimer * 8) * 0.6;

  // Player attacks every 2.4s (OSRS 4-tick)
  if (State.combatTimer >= 2.4) {
    State.combatTimer = 0;

    // Player hits monster
    const maxHit = Math.max(1, State.skills.strength.level + (State.equipment.weapon?.attackBonus || 0));
    const accuracy = 0.5 + State.skills.attack.level * 0.03;
    if (Math.random() < accuracy) {
      const damage = Math.floor(Math.random() * maxHit) + 1;
      mon.userData.currentHP -= damage;
      showHitSplat(mon, damage);
      chatMsg(`You hit the ${mon.userData.name} for ${damage} damage.`, 'combat');
    } else {
      showHitSplat(mon, 0);
    }

    // Monster attacks player
    const monMaxHit = Math.max(1, mon.userData.level);
    const monAccuracy = 0.3 + mon.userData.level * 0.05;
    if (Math.random() < monAccuracy) {
      const monDmg = Math.floor(Math.random() * monMaxHit) + 1;
      State.currentHP -= monDmg;
      showHitSplat(player, monDmg);
      if (State.currentHP <= 0) {
        State.currentHP = 0;
        chatMsg("Oh dear, you are dead!", 'game');
        // Respawn at lumbridge
        setTimeout(() => {
          player.position.set(0, 0, -25);
          State.currentHP = State.maxHP;
          cancelActions();
          chatMsg("You respawn in Lumbridge.", 'system');
        }, 2000);
        cancelActions();
        return;
      }
    } else {
      showHitSplat(player, 0);
    }

    // Monster dies
    if (mon.userData.currentHP <= 0) {
      mon.userData.currentHP = 0;
      mon.userData.active = false;
      chatMsg(`You kill the ${mon.userData.name}!`, 'combat');

      // XP
      addXP('attack', mon.userData.xpAttack);
      addXP('strength', mon.userData.xpStr);
      addXP('hitpoints', Math.round(mon.userData.xpHP));

      // Loot drops
      const drops = [];
      for (const lootDef of mon.userData.loot) {
        if (Math.random() < lootDef.chance) {
          const count = lootDef.count
            ? Math.floor(Math.random() * (lootDef.count[1] - lootDef.count[0] + 1)) + lootDef.count[0]
            : 1;
          drops.push({ name: lootDef.name, count });
        }
      }
      if (drops.length > 0) {
        createLootPile(mon.position.x, mon.position.z, drops);
        chatMsg(`Loot: ${drops.map(d => (d.count > 1 ? d.count + ' x ' : '') + d.name).join(', ')}`, 'drop');
      }

      // Death animation: sink into ground
      mon.userData.deathAnim = 0;

      // Respawn after 15s
      const spawnX = mon.userData.wanderCenter.x;
      const spawnZ = mon.userData.wanderCenter.y;
      setTimeout(() => {
        mon.position.set(spawnX, 0, spawnZ);
        mon.userData.currentHP = mon.userData.maxHP;
        mon.userData.active = true;
        mon.userData.inCombat = false;
        mon.userData.deathAnim = undefined;
        mon.visible = true;
        mon.scale.set(1, 1, 1);
      }, 15000);

      cancelActions();
    }
  }
}

// ============================================================
// MINIMAP
// ============================================================
const minimapCanvas = document.getElementById('minimap-canvas');
const mCtx = minimapCanvas.getContext('2d');

function drawMinimap() {
  const w = 172, h = 172;
  mCtx.fillStyle = '#1a3a1a';
  mCtx.fillRect(0, 0, w, h);

  const scale = 1.4;
  const cx = w / 2, cy = h / 2;
  const px = player.position.x, pz = player.position.z;

  // Water
  mCtx.fillStyle = '#1a4488';
  mCtx.fillRect(cx + (-25 - 8 - px) * scale, cy + (-100 - pz) * scale, 16 * scale, 200 * scale);

  // Paths
  mCtx.fillStyle = '#7a5a35';
  mCtx.fillRect(cx + (0 - 3 - px) * scale, cy + (-35 - pz) * scale, 6 * scale, 50 * scale);
  mCtx.fillRect(cx + (-5 - px) * scale, cy + (-33 - pz) * scale, 40 * scale, 6 * scale);

  // Buildings
  mCtx.fillStyle = '#888';
  mCtx.fillRect(cx + (0 - 8 - px) * scale, cy + (-35 - 7 - pz) * scale, 16 * scale, 14 * scale);
  mCtx.fillStyle = '#996633';
  mCtx.fillRect(cx + (18 - 4 - px) * scale, cy + (-28 - 3.5 - pz) * scale, 8 * scale, 7 * scale);
  mCtx.fillStyle = '#aaa';
  mCtx.fillRect(cx + (-10 - 3.5 - px) * scale, cy + (-22 - 6 - pz) * scale, 7 * scale, 12 * scale);

  // Trees
  mCtx.fillStyle = '#0a5a0a';
  for (const t of trees) {
    if (!t.visible || !t.userData.active) continue;
    const tx = cx + (t.position.x - px) * scale;
    const ty = cy + (t.position.z - pz) * scale;
    mCtx.beginPath();
    mCtx.arc(tx, ty, t.userData.isOak ? 3 : 2, 0, Math.PI * 2);
    mCtx.fill();
  }

  // Mining rocks
  mCtx.fillStyle = '#8a6a3a';
  for (const r of miningRocks) {
    const rx = cx + (r.position.x - px) * scale;
    const ry = cy + (r.position.z - pz) * scale;
    mCtx.fillRect(rx - 2, ry - 2, 4, 4);
  }

  // Monsters
  mCtx.fillStyle = '#ff4444';
  for (const m of monsters) {
    if (!m.visible || !m.userData.active) continue;
    const mx = cx + (m.position.x - px) * scale;
    const my = cy + (m.position.z - pz) * scale;
    mCtx.fillRect(mx - 2, my - 2, 4, 4);
  }

  // NPCs
  mCtx.fillStyle = '#ffff00';
  for (const n of npcs) {
    const nx = cx + (n.position.x - px) * scale;
    const ny = cy + (n.position.z - pz) * scale;
    mCtx.beginPath();
    mCtx.arc(nx, ny, 3, 0, Math.PI * 2);
    mCtx.fill();
  }

  // Fishing spots
  mCtx.fillStyle = '#00ccff';
  for (const f of fishingSpots) {
    const fx = cx + (f.position.x - px) * scale;
    const fy = cy + (f.position.z - pz) * scale;
    mCtx.beginPath();
    mCtx.arc(fx, fy, 3, 0, Math.PI * 2);
    mCtx.fill();
  }

  // Loot piles
  mCtx.fillStyle = '#ff2222';
  for (const l of lootPiles) {
    const lx = cx + (l.position.x - px) * scale;
    const ly = cy + (l.position.z - pz) * scale;
    mCtx.fillRect(lx - 1, ly - 1, 3, 3);
  }

  // Player (center white)
  mCtx.fillStyle = '#ffffff';
  mCtx.beginPath();
  mCtx.arc(cx, cy, 4, 0, Math.PI * 2);
  mCtx.fill();

  // Player direction arrow
  mCtx.strokeStyle = '#ffffff';
  mCtx.lineWidth = 2;
  mCtx.beginPath();
  mCtx.moveTo(cx, cy);
  mCtx.lineTo(cx + Math.sin(player.rotation.y) * 10, cy - Math.cos(player.rotation.y) * 10);
  mCtx.stroke();

  // Circular mask
  mCtx.globalCompositeOperation = 'destination-in';
  mCtx.beginPath();
  mCtx.arc(w/2, h/2, w/2 - 1, 0, Math.PI * 2);
  mCtx.fill();
  mCtx.globalCompositeOperation = 'source-over';
}

// ============================================================
// NPC WANDER
// ============================================================
function updateNPCs(dt) {
  for (const npc of npcs) {
    npc.userData.wanderTimer -= dt;
    if (npc.userData.wanderTimer <= 0) {
      const center = npc.userData.wanderCenter;
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * 4;
      npc.userData.wanderTarget = new THREE.Vector2(
        center.x + Math.cos(angle) * dist,
        center.y + Math.sin(angle) * dist
      );
      npc.userData.wanderTimer = 4 + Math.random() * 6;
    }
    if (npc.userData.wanderTarget) {
      const target = npc.userData.wanderTarget;
      const dx = target.x - npc.position.x;
      const dz = target.y - npc.position.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist > 0.3) {
        const speed = 1.5 * dt;
        npc.position.x += (dx / dist) * speed;
        npc.position.z += (dz / dist) * speed;
        npc.rotation.y = Math.atan2(dx, dz);
      }
    }
  }
}

function updateMonsters(dt) {
  for (const mon of monsters) {
    if (!mon.userData.active) {
      // Death animation
      if (mon.userData.deathAnim !== undefined) {
        mon.userData.deathAnim += dt;
        mon.scale.y = Math.max(0.01, 1 - mon.userData.deathAnim * 2);
        if (mon.userData.deathAnim > 0.5) {
          mon.visible = false;
        }
      }
      continue;
    }
    if (mon.userData.inCombat) continue;

    mon.userData.wanderTimer -= dt;
    if (mon.userData.wanderTimer <= 0) {
      const center = mon.userData.wanderCenter;
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * 3;
      mon.userData.wanderTarget = new THREE.Vector2(
        center.x + Math.cos(angle) * dist,
        center.y + Math.sin(angle) * dist
      );
      mon.userData.wanderTimer = 2 + Math.random() * 4;
    }
    if (mon.userData.wanderTarget) {
      const target = mon.userData.wanderTarget;
      const dx = target.x - mon.position.x;
      const dz = target.y - mon.position.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist > 0.3) {
        const speed = 1.0 * dt;
        mon.position.x += (dx / dist) * speed;
        mon.position.z += (dz / dist) * speed;
        mon.rotation.y = Math.atan2(dx, dz);
      }
    }
  }
}

// ============================================================
// HEALTH BARS (3D sprites above monsters)
// ============================================================
function drawHealthBars() {
  // Remove old bars
  document.querySelectorAll('.health-bar-container').forEach(el => el.remove());

  // Player HP
  const playerHPPct = (State.currentHP / State.maxHP) * 100;

  for (const mon of monsters) {
    if (!mon.visible || !mon.userData.active) continue;
    if (!mon.userData.inCombat && mon.userData.currentHP >= mon.userData.maxHP) continue;

    const pos = toScreenPos(mon.position);
    if (pos.x < 0 || pos.x > window.innerWidth || pos.y < 0 || pos.y > window.innerHeight) continue;

    const hpPct = (mon.userData.currentHP / mon.userData.maxHP) * 100;
    const container = document.createElement('div');
    container.className = 'health-bar-container';
    container.style.left = (pos.x - 16) + 'px';
    container.style.top = (pos.y - 40) + 'px';
    container.innerHTML = `<div class="health-bar-bg"><div class="health-bar-fill ${hpPct < 25 ? 'critical' : hpPct < 50 ? 'low' : ''}" style="width:${hpPct}%"></div></div>`;
    document.body.appendChild(container);
  }
}

// ============================================================
// LOOT PILE UPDATE
// ============================================================
function updateLootPiles(dt) {
  for (let i = lootPiles.length - 1; i >= 0; i--) {
    const pile = lootPiles[i];
    pile.timer -= dt;
    if (pile.timer <= 0) {
      if (pile.mesh) scene.remove(pile.mesh);
      lootPiles.splice(i, 1);
      continue;
    }
    // Pulse the dot
    if (pile.mesh) {
      pile.mesh.material.opacity = 0.5 + Math.sin(Date.now() * 0.005) * 0.5;
      pile.mesh.material.transparent = true;
    }
  }

  // Auto-pickup when walking near
  for (let i = lootPiles.length - 1; i >= 0; i--) {
    const pile = lootPiles[i];
    if (player.position.distanceTo(pile.position) < 1.5) {
      for (const item of pile.items) {
        addItem(item.name, item.count || 1);
        chatMsg(`You pick up: ${item.count > 1 ? item.count + ' x ' : ''}${item.name}`, 'drop');
      }
      if (pile.mesh) scene.remove(pile.mesh);
      lootPiles.splice(i, 1);
    }
  }
}

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();
let walkCycle = 0;
let frameCount = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  frameCount++;

  // Camera keyboard
  if (keysDown.has('ArrowLeft')) cameraAngle += 2.5 * dt;
  if (keysDown.has('ArrowRight')) cameraAngle -= 2.5 * dt;
  if (keysDown.has('ArrowUp')) cameraPitch = Math.min(1.3, cameraPitch + dt);
  if (keysDown.has('ArrowDown')) cameraPitch = Math.max(0.15, cameraPitch - dt);

  // Player movement
  if (moveTarget) {
    const dx = moveTarget.x - player.position.x;
    const dz = moveTarget.z - player.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const interactionDist = pendingInteraction ? 2.5 : 0.3;

    if (dist > interactionDist) {
      const step = Math.min(playerSpeed * dt, dist);
      player.position.x += (dx / dist) * step;
      player.position.z += (dz / dist) * step;
      player.rotation.y = Math.atan2(dx, dz);

      walkCycle += dt * 8;
      leftLegPivot.rotation.x = Math.sin(walkCycle) * 0.5;
      rightLegPivot.rotation.x = -Math.sin(walkCycle) * 0.5;
      leftArmPivot.rotation.x = -Math.sin(walkCycle) * 0.3;
      if (!State.isChopping && !State.isMining && !State.inCombat) {
        rightArmPivot.rotation.x = Math.sin(walkCycle) * 0.3;
      }
    } else {
      moveTarget = null;
      clickMarker.visible = false;
      leftLegPivot.rotation.x = 0;
      rightLegPivot.rotation.x = 0;
      leftArmPivot.rotation.x = 0;
      if (!State.isChopping && !State.isMining && !State.inCombat) {
        rightArmPivot.rotation.x = 0;
      }

      if (pendingInteraction) {
        const pi = pendingInteraction;
        pendingInteraction = null;
        if (pi.type === 'talk') openNPCDialog(pi.name);
        else if (pi.type === 'chop') startChopping(pi.tree);
        else if (pi.type === 'mine') startMining(pi.rock);
        else if (pi.type === 'fish') startFishing(pi.spot);
        else if (pi.type === 'attack') startCombat(pi.target);
      }
    }
  }

  // Skills
  doChopTick(dt);
  doMineTick(dt);
  doFishTick(dt);
  doCombatTick(dt);

  // Tree falling animation
  for (const t of trees) {
    if (t.userData.falling) {
      t.userData.fallAngle = (t.userData.fallAngle || 0) + 2 * dt;
      const axis = t.userData.fallAxis;
      t.setRotationFromAxisAngle(axis, Math.min(t.userData.fallAngle, Math.PI / 2));
      if (t.userData.fallAngle >= Math.PI / 2) {
        setTimeout(() => { t.visible = false; }, 500);
        t.userData.falling = false;
      }
    }
  }

  // NPCs & Monsters
  updateNPCs(dt);
  updateMonsters(dt);
  updateLootPiles(dt);

  // Camera
  const camX = player.position.x + Math.sin(cameraAngle) * Math.cos(cameraPitch) * cameraDistance;
  const camY = Math.sin(cameraPitch) * cameraDistance;
  const camZ = player.position.z + Math.cos(cameraAngle) * Math.cos(cameraPitch) * cameraDistance;
  camera.position.set(camX, camY, camZ);
  camera.lookAt(player.position.x, 2, player.position.z);

  // Water UV animation
  if (waterMat.map) {
    waterMat.map.offset.y += dt * 0.05;
  }

  // Fire animation
  fireGroup.children.forEach(c => {
    if (c.userData._flame) {
      c.position.y = 0.5 + Math.sin(Date.now() * 0.01 + c.id) * 0.15;
      c.scale.x = 0.8 + Math.sin(Date.now() * 0.008 + c.id * 2) * 0.3;
    }
  });
  fireLight.intensity = 1.2 + Math.sin(Date.now() * 0.006) * 0.4;

  // Mining rock sparkle
  for (const r of miningRocks) {
    if (r.userData._sparkle && r.userData.active) {
      r.userData._sparkle.position.y = 1.2 + Math.sin(Date.now() * 0.004 + r.id) * 0.1;
      r.userData._sparkle.rotation.y += dt * 2;
    }
  }

  // Click marker pulse
  if (clickMarker.visible) {
    clickMarker.scale.setScalar(1 + Math.sin(Date.now() * 0.005) * 0.15);
    clickMarker.material.opacity = 0.5 + Math.sin(Date.now() * 0.003) * 0.3;
    clickMarker.material.transparent = true;
  }

  // Fishing spot bubble animation
  for (const f of fishingSpots) {
    f.children.forEach((c, i) => {
      if (c.isMesh) {
        c.position.y = 0.1 + Math.abs(Math.sin(Date.now() * 0.003 + i * 1.5)) * 0.4;
      }
    });
  }

  // Draw health bars every few frames
  if (frameCount % 3 === 0) drawHealthBars();

  drawMinimap();
  renderer.render(scene, camera);
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// TOOLTIP
// ============================================================
const tooltip = document.getElementById('tooltip');
renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(getClickableObjects(), true);
  if (hits.length > 0) {
    const group = findParentGroup(hits[0].object);
    if (group && group.userData.name) {
      tooltip.style.display = 'block';
      tooltip.textContent = group.userData.name;
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY + 15) + 'px';

      // Change cursor for monsters
      if (group.userData.type === 'monster' && group.userData.active) {
        renderer.domElement.style.cursor = 'crosshair';
      } else {
        renderer.domElement.style.cursor = 'pointer';
      }
      return;
    }
  }
  tooltip.style.display = 'none';
  renderer.domElement.style.cursor = 'default';
});

// ============================================================
// LOADING
// ============================================================
const loadBar = document.getElementById('loading-bar');
const loadScreen = document.getElementById('loading');
const loadText = document.getElementById('loading-text');
const loadMessages = [
  'Planting trees...', 'Feeding chickens...', 'Polishing axes...',
  'Stocking the general store...', 'Waking up Hans...',
  'Mixing potions...', 'Sharpening swords...', 'Loading Lumbridge...'
];
let loadProgress = 0;
let loadMsgIdx = 0;
const loadInterval = setInterval(() => {
  loadProgress += 6 + Math.random() * 10;
  if (loadProgress > loadMsgIdx * 14 + 10) {
    loadText.textContent = loadMessages[loadMsgIdx % loadMessages.length];
    loadMsgIdx++;
  }
  if (loadProgress >= 100) {
    loadProgress = 100;
    loadBar.style.width = '100%';
    loadText.textContent = 'Welcome to LumbridgeScape!';
    clearInterval(loadInterval);
    setTimeout(() => {
      loadScreen.style.display = 'none';
      chatMsg("Welcome to LumbridgeScape!", 'system');
      chatMsg("Left-click to move. Right-click for options.", 'system');
      chatMsg("You have a Bronze Axe equipped — click trees to chop them!", 'system');
      chatMsg("Kill chickens, mine rocks, catch fish. Level up!", 'npc');
      chatMsg("Right-click inventory items to cook food near the fire.", 'system');
      animate();
    }, 500);
  }
  loadBar.style.width = loadProgress + '%';
}, 150);

// Give player starting items
addItem('Bronze pickaxe');
addItem('Fishing rod');
refreshInventory();

</script>
